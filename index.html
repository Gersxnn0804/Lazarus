
          <div class="filters">
            <label class="filter-control search-control">
              <span>Buscar</span>
              <input id="searchInput" type="search" placeholder="Buscar por orden, waybill, estado o descripción..." />
            </label>

            <label class="filter-control">
              <span>Estado</span>
              <select id="statusFilter">
                <option value="">Todos los estados</option>
              </select>
            </label>

            <label class="filter-control">
              <span>Categoría</span>
              <select id="categoryFilter">
                <option value="">Todas las categorías</option>
              </select>
            </label>

            <label class="filter-control">
              <span>Fecha</span>
              <select id="dateFilter">
                <option value="">Todas las fechas</option>
              </select>
            </label>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th><button class="sort-btn" data-sort="order">Orden</button></th>
                  <th><button class="sort-btn" data-sort="waybill">Waybill</button></th>
                  <th><button class="sort-btn" data-sort="lastEventDate">Fecha</button></th>
                  <th><button class="sort-btn" data-sort="status">Estado</button></th>
                  <th><button class="sort-btn" data-sort="category">Categoría</button></th>
                </tr>
              </thead>
              <tbody id="ordersTable">
                <tr><td colspan="5" class="table-empty">Sin datos para mostrar</td></tr>
              </tbody>
            </table>
          </div>

          <div class="table-toolbar">
            <span id="pageInfo">Página 1 de 1</span>
            <div>
              <button id="prevPageBtn" class="mini-btn">Anterior</button>
              <button id="nextPageBtn" class="mini-btn">Siguiente</button>
            </div>
          </div>
        </article>

        <article class="panel detail-panel" id="detail">
          <div class="panel-header">
            <div>
              <h3>Detalle del envío</h3>
              <p>Ficha ejecutiva del registro seleccionado.</p>
            </div>
          </div>

          <div id="orderDetail" class="detail-empty">
            <div>
              <div class="empty-icon small">◇</div>
              <p>Selecciona un envío para ver su detalle.</p>
            </div>
          </div>
        </article>
      </section>
    </main>
  </div>

  
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
  <script src="js/app.js?v=20260701-thermometer"></script>
</body>
</html>
